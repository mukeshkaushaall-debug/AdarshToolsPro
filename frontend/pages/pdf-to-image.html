<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PDF To Image - ThugTools</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;650;750;850;900&display=swap" rel="stylesheet"><link rel="stylesheet" href="../style.css">
</head>
<body>
  <div class="rgb-line"></div><nav class="nav"><div class="container nav-inner"><a class="brand" href="../index.html"><div class="brand-mark">T</div><span>ThugTools</span></a><div class="nav-links"><a href="../index.html#tools">Tools</a><a class="active" href="#">PDF Image</a></div><div class="nav-actions"><button class="icon-btn" data-theme aria-label="Toggle theme"><span data-icon="sun"></span></button><button class="menu-btn" aria-label="Open menu"><span data-icon="menu"></span></button></div></div></nav>
  <main class="tool-shell"><div class="container tool-panel reveal">
    <section class="tool-intro"><span class="eyebrow">PDF pages to PNG</span><h1>PDF To Image</h1><p class="lead">Export PDF pages into high-quality PNG images packed in a ZIP file.</p></section>
    <form class="form-stack" data-upload-form data-endpoint="/api/pdf/pdf-to-image">
      <label class="upload-zone"><input type="file" name="file" accept="application/pdf,.pdf" required><div><div data-icon="upload"></div><h3>Drop PDF here</h3><p data-file-name>or tap to browse</p></div></label>
      <select name="scale"><option value="2">Sharp quality</option><option value="3">High quality</option><option value="1">Fast export</option></select>
      <button class="btn" type="submit">Export images</button><div class="progress-wrap"><div class="progress-bar"></div></div><div class="result-box" data-result></div>
    </form>
  </div></main>
  <footer class="footer"><div class="container footer-inner"><span>ThugTools</span><span>PDF pages are exported as PNG images.</span></div></footer><div class="toast"></div><div class="spinner"><div class="loader"></div></div><script src="../script.js?v=20260512-invoice-modern-hide"></script>
</body>
</html>
