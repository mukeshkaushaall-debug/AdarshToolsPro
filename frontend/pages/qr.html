<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
  <title>QR Code Generator - ThugTools</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;650;750;850;900&display=swap" rel="stylesheet"><link rel="stylesheet" href="../style.css">
</head>
<body>
  <div class="rgb-line"></div><nav class="nav"><div class="container nav-inner"><a class="brand" href="../index.html"><div class="brand-mark">T</div><span>ThugTools</span></a><div class="nav-links"><a href="../index.html#tools">Tools</a><a class="active" href="#">QR</a></div><div class="nav-actions"><button class="icon-btn" data-theme aria-label="Toggle theme"><span data-icon="sun"></span></button><button class="menu-btn" aria-label="Open menu"><span data-icon="menu"></span></button></div></div></nav>
  <main class="tool-shell"><div class="container tool-panel reveal">
    <section class="tool-intro"><span class="eyebrow">High traffic utility</span><h1>QR Code Generator</h1><p class="lead">Create sharp QR codes for websites, profiles, UPI/payment text, Wi-Fi notes, and business cards.</p></section>
    <form class="form-stack" data-json-form data-endpoint="/api/qr/generate">
      <input class="input" name="text" placeholder="Paste URL or text for QR code" required>
      <select name="size"><option value="12">Standard size</option><option value="16">Large HD</option><option value="20">Ultra HD</option></select>
      <button class="btn" type="submit">Generate QR</button><div class="progress-wrap"><div class="progress-bar"></div></div><div class="result-box" data-result></div>
    </form>
  </div></main>
  <footer class="footer"><div class="container footer-inner"><span>ThugTools</span><span>QR output is PNG and print friendly.</span></div></footer><div class="toast"></div><div class="spinner"><div class="loader"></div></div><script src="../script.js?v=20260511-advanced-image"></script>
</body>
</html>
