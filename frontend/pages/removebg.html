<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Remove Background - ThugTools</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;650;750;850;900&display=swap" rel="stylesheet"><link rel="stylesheet" href="../style.css">
</head>
<body>
  <div class="rgb-line"></div><nav class="nav"><div class="container nav-inner"><a class="brand" href="../index.html"><div class="brand-mark">T</div><span>ThugTools</span></a><div class="nav-links"><a href="../index.html#tools">Tools</a><a class="active" href="#">Remove BG</a></div><div class="nav-actions"><button class="icon-btn" data-theme aria-label="Toggle theme"><span data-icon="sun"></span></button><button class="menu-btn" aria-label="Open menu"><span data-icon="menu"></span></button></div></div></nav>
  <main class="tool-shell"><div class="container tool-panel reveal">
    <section class="tool-intro"><span class="eyebrow">Advanced AI cutout</span><h1>Remove Background</h1><p class="lead">Upload a product, portrait, or object photo. Use alpha matting, soft edge feathering, and optional studio background output.</p></section>
    <form class="form-stack" data-upload-form data-endpoint="/api/image/removebg">
      <label class="upload-zone"><input type="file" name="file" accept="image/*" required><div><div data-icon="upload"></div><h3>Drop image here</h3><p data-file-name>or tap to browse</p></div></label>
      <select name="background"><option value="transparent">Transparent PNG</option><option value="white">White background</option><option value="black">Dark background</option><option value="blue">Blue studio background</option></select>
      <label>Edge softness <input type="range" name="feather" min="0" max="8" value="2"></label>
      <button class="btn" type="submit">Remove background</button><div class="progress-wrap"><div class="progress-bar"></div></div><div class="preview-grid"><div class="preview-card"><span>Before</span><div data-before></div></div><div class="preview-card"><span>After</span><div data-after></div></div></div><div class="result-box" data-result></div>
    </form>
  </div></main>
  <footer class="footer"><div class="container footer-inner"><span>ThugTools</span><span>First run may download the AI model.</span></div></footer><div class="toast"></div><div class="spinner"><div class="loader"></div></div><script src="../script.js?v=20260511-advanced-image"></script>
</body>
</html>
