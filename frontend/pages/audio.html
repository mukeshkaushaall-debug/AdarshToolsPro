<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Video To MP3 - ThugTools</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;650;750;850;900&display=swap" rel="stylesheet"><link rel="stylesheet" href="../style.css">
</head>
<body>
  <div class="rgb-line"></div><nav class="nav"><div class="container nav-inner"><a class="brand" href="../index.html"><div class="brand-mark">T</div><span>ThugTools</span></a><div class="nav-links"><a href="../index.html#tools">Tools</a><a class="active" href="#">MP3</a></div><div class="nav-actions"><button class="icon-btn" data-theme aria-label="Toggle theme"><span data-icon="sun"></span></button><button class="menu-btn" aria-label="Open menu"><span data-icon="menu"></span></button></div></div></nav>
  <main class="tool-shell"><div class="container tool-panel reveal">
    <section class="tool-intro"><span class="eyebrow">Audio extractor</span><h1>Video To MP3</h1><p class="lead">Convert by public video link or upload your own video file. Output is clean 192 kbps MP3.</p></section>
    <div class="form-stack">
      <form class="form-stack" data-url-form data-endpoint="/api/convert/audio">
        <input class="input" type="url" name="url" placeholder="Paste video URL" required>
        <button class="btn" type="submit">Convert link to MP3</button><div class="progress-wrap"><div class="progress-bar"></div></div><div class="result-box" data-result></div>
      </form>
      <form class="form-stack" data-video-upload-form data-endpoint="/api/convert/audio-upload">
        <label class="upload-zone"><input type="file" name="file" accept="video/*" required><div><div data-icon="upload"></div><h3>Upload video</h3><p data-file-name>MP4, MOV, MKV, WEBM</p></div></label>
        <div class="link-preview" data-video-preview></div>
        <button class="btn secondary" type="submit">Convert uploaded video</button>
      </form>
    </div>
  </div></main>
  <footer class="footer"><div class="container footer-inner"><span>ThugTools</span><span>FFmpeg is required for final MP3 conversion.</span></div></footer><div class="toast"></div><div class="spinner"><div class="loader"></div></div><script src="../script.js?v=20260511-advanced-image"></script>
</body>
</html>
