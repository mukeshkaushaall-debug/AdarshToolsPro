services:
  cobalt:
    image: ghcr.io/imputnet/cobalt:11
    init: true
    read_only: true
    restart: unless-stopped
    container_name: thugtools-cobalt
    ports:
      - "9000:9000/tcp"
    environment:
      # Replace this with the public HTTPS URL of this relay after deployment.
      API_URL: "https://your-cobalt-relay.example/"
    labels:
      - com.centurylinklabs.watchtower.scope=thugtools-cobalt

  watchtower:
    image: ghcr.io/containrrr/watchtower
    restart: unless-stopped
    command: --cleanup --scope thugtools-cobalt --interval 900 --include-restarting
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
